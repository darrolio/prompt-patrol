{% extends "base.html" %}
{% block title %}Edit {{ doc.display_name }} - Prompt Patrol{% endblock %}

{% block content %}
<div class="page-header">
    <h2>Edit Document</h2>
    <p>{{ doc.filename }}</p>
</div>

<div class="card">
    <div class="card-body">
        <form method="post" action="{{ base_url }}/{{ doc.id }}/edit" enctype="multipart/form-data">
            <div class="form-group">
                <label>Display Name</label>
                <input type="text" name="display_name" value="{{ doc.display_name }}" required>
            </div>
            <input type="hidden" name="doc_type" value="{{ doc.doc_type }}">
            <div class="form-group">
                <label>Replace with new file (optional)</label>
                <input type="file" name="file" accept=".pdf,.txt,.md,.docx"
                       style="padding: 6px 0;">
                <small class="text-muted">Upload a new file to replace the extracted text below. Accepted: .pdf, .txt, .md, .docx</small>
            </div>
            <div class="form-group">
                <label>Extracted Text</label>
                <textarea name="content" rows="20" required>{{ doc.content }}</textarea>
            </div>
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a href="{{ base_url }}" class="btn">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
